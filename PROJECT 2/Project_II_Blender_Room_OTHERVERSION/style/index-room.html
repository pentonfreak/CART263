<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Interactive Isometric Room</title>
  <link rel="stylesheet" href="style-room.css" />
  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
        "three/examples/jsm/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
      }
    }
  </script>
</head>

<body>
  <div id="app"></div>

  <div id="ui">
    <div id="siteTitle">
      <h1>Project Secundus</h1>

    </div>
    <div id="siteSub">
      <p class="paragraph">Click objects to explore</p>
    </div>
  </div>

  <div id="panel" class="hidden">
    <button id="closePanel">×</button>
    <h2 id="panelTitle">Title</h2>
    <div id="panelBody">Content goes here.</div>
  </div>
  <div id="Buttonholder">
    <button id="buttonIn">IN</button>
    <button id="buttonOut">OUT</button>
  </div>

  <script type="module" src="js/Room.js"></script>

  <canvas id="threeCanvas"></canvas>
</body>

</html>
