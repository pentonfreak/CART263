<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Interactive Isometric Dungeon</title>
  <link rel="stylesheet" href="style-dungeon.css" />
  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
        "three/examples/jsm/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
      }
    }
  </script>
</head>
<body>

  <div class="toggle-bar">
    <span class="toggle-icon toggle-icon-top">💀</span>
    <button id="toggleViewBtn" class="toggle-button">
      <div class="toggle-circle"></div>
    </button>
    <span class="toggle-icon toggle-icon-bottom">🏠</span>
  </div>

  <div id="app"></div>

  <div id="ui">
    <div id="siteTitle"><h1>Project Secundus</h1></div>
    <div id="siteSub"><p class="paragraph">Click objects to explore</p></div>
  </div>

  <!-- info panel -->
  <div id="panel" class="panel hidden">
    <button id="closePanel" class="close-btn">✕</button>
    <h2 id="panelTitle"></h2>
    <div id="panelBody"></div>
  </div>


 <video id="videoTexture" loop muted crossOrigin="anonymous" playsinline preload="auto" style="display:none">
    <source src="jordan_Model/smashmeleegameplay.mp4" type="video/mp4">
  </video>

  <!-- canvases -->
  <canvas id="dungeonCanvas"></canvas>
  <canvas id="threeCanvas" style="display: none;"></canvas>

  <script type="module" src="dungeon.js"></script>
  <script type="module" src="Room.js"></script>
</body>
</html>
