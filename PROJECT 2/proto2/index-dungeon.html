<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Interactive Isometric Dungeon</title>
  <link rel="stylesheet" href="style-dungeon.css" />
  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
        "three/examples/jsm/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
      }
    }
  </script>
</head>
<body>

  <div class="toggle-bar">
        <div class="dungeon-wrapper">
        <button class="toggle-button">
          <div class="toggle-circle"></div>
        </button>
        <div class="room-wrapper">
        </div>
      </div>


  <div>
    <div id="app"></div>
    <div id="ui">
      <div id="siteTitle"><h1>Project Secundus</h1></div>
      <div id="siteSub"><p class="paragraph">Click objects to explore</p></div>
    </div>
  

    <canvas id="dungeonCanvas"></canvas>
    <canvas style="display: none;" id="threeCanvas"></canvas>
    <script type="module" src="dungeon.js"></script>
    <script type="module" src="Room.js"></script>
</div>
</body>
</html>
