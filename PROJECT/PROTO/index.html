<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Khuong's Project 1</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div id="panels">
    <article class="panel">
      <div class="panel-content">
        <div class="icon">🏢</div>
        <div class="text">
          <h3>Hover</h3>
          <p class="paragraph">Hover and See</p>
        </div>
      </div>
    </article>

    <article class="panel">
      <div class="panel-content">
        <div class="icon">🦄</div>
        <div class="text">
          <h3>Click</h3>
          <p class="paragraph">Click and See</p>
        </div>
      </div>
    </article>

    <article class="panel">
      <div class="panel-content">
        <div class="icon">📞</div>
        <div class="text">
          <h3>Hold left click</h3>
          <p class="paragraph">Hold and See</p>
        </div>
      </div>
    </article>

    <article class="panel">
      <div class="panel-content">
        <div class="icon">🚪</div>
        <div class="text">
          <h3>Press Z</h3>
          <p class="paragraph">Press and See</p>
        </div>
      </div>
    </article>

    <article class="panel">
      <div class="panel-content">
        <div class="icon">🚪</div>
        <div class="text">
          <h3>Press and Hold Spacebar</h3>
          <p class="paragraph">Press, Hold and See</p>
        </div>
      </div>
    </article>

    <article class="panel">
      <div class="panel-content">
        <div class="icon">🦦</div>
        <div class="text">
          <h3>Otters</h3>
          <p class="paragraph">Look at me, imma cute lil fella.</p>
        </div>
      </div>
    </article>
  </div>

  <script src="js/main.js"></script>
</body>
</html>
