<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Khuong's Project 1</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <h1>Optic Interactions</h1>
  <div id="panels">
    <div class="panel" data-action="hover-pupils">
      <div class="panel-content">
        <div class="face" aria-hidden="true">
  <div class="eye">
    <div class="lid"></div>
    <div class="pupil"></div>
  </div>
  <div class="eye">
    <div class="lid"></div>
    <div class="pupil"></div>
  </div>
</div>
        <div class="text">
          <h3>Hover</h3>
          <p class="paragraph">Hover and See</p>
        </div>
      </div>
    </div>

    <div class="panel" data-action="click-blink">
      <div class="panel-content">
        <div class="face" aria-hidden="true">
  <div class="eye">
    <div class="lid"></div>
    <div class="pupil"></div>
  </div>
  <div class="eye">
    <div class="lid"></div>
    <div class="pupil"></div>
  </div>
</div>
        <div class="text">
          <h3>Click</h3>
          <p class="paragraph">Click and See</p>
        </div>
      </div>
    </div>

    <div class="panel" data-action="hold-left-click-grow">
      <div class="panel-content">
        <div class="face" aria-hidden="true">
  <div class="eye">
    <div class="lid"></div>
    <div class="pupil"></div>
  </div>
  <div class="eye">
    <div class="lid"></div>
    <div class="pupil"></div>
  </div>
</div>
        <div class="text">
          <h3>Hold left click</h3>
          <p class="paragraph">Hold and See</p>
        </div>
      </div>
    </div>

    <div class="panel" data-action="toggle-z">
      <div class="panel-content">
        <div class="face" aria-hidden="true">
  <div class="eye">
    <div class="lid"></div>
    <div class="pupil"></div>
  </div>
  <div class="eye">
    <div class="lid"></div>
    <div class="pupil"></div>
  </div>
</div>
        <div class="text">
          <h3>Press Z</h3>
          <p class="paragraph">Press and See</p>
        </div>
      </div>
    </div>

    <div class="panel" data-action="hold-spacebar">
      <div class="panel-content">
        <div class="face" aria-hidden="true">
  <div class="eye">
    <div class="lid"></div>
    <div class="pupil"></div>
  </div>
  <div class="eye">
    <div class="lid"></div>
    <div class="pupil"></div>
  </div>
</div>
        <div class="text">
          <h3>Press and Hold Spacebar</h3>
          <p class="paragraph">Press, Hold and See</p>
        </div>
      </div>
    </div>
  </div>
  <script src="js/main.js"></script>
</body>
</html>
