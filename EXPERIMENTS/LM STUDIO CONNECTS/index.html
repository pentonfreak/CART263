<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MindCard | PDF to Flashcards</title>
    <!-- Tailwind CSS for modern styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- PDF.js for reading PDF files -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
            transition: background-color 0.5s ease;
        }

        /* Flashcard Flip Animation */
        .perspective {
            perspective: 1000px;
        }
        .card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            text-align: center;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            transform-style: preserve-3d;
            cursor: pointer;
        }
        .card-flipped {
            transform: rotateY(180deg);
        }
        .card-front, .card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            border-radius: 1.5rem;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
        }
        .card-back {
            transform: rotateY(180deg);
            background-color: #ffffff;
        }
        .card-front {
            background-color: #ffffff;
        }

        /* Glassmorphism effect */
        .glass {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        /* Custom Loading Animation */
        .loader {
            border-top-color: #6366f1;
            animation: spinner 1.5s linear infinite;
        }
        @keyframes spinner {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4">

    <!-- Header -->
    <header class="mb-8 text-center">
        <h1 class="text-4xl font-bold text-slate-800 tracking-tight">MindCard</h1>
        <p class="text-slate-500 mt-2">Transform PDFs into interactive learning.</p>
    </header>

    <!-- Main Container -->
    <main class="w-full max-w-xl">
        
        <!-- Upload Section -->
        <div id="upload-section" class="glass p-10 rounded-3xl border-2 border-dashed border-slate-300 flex flex-col items-center justify-center transition-all hover:border-indigo-400 group">
            <div class="bg-indigo-50 p-4 rounded-full mb-4 group-hover:scale-110 transition-transform">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 text-indigo-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12" />
                </svg>
            </div>
            <label for="file-upload" class="cursor-pointer">
                <span class="text-lg font-medium text-slate-700">Click to upload PDF</span>
                <p class="text-sm text-slate-400 mt-1">Maximum size: 10MB</p>
            </label>
            <input id="file-upload" type="file" accept=".pdf" class="hidden" />
        </div>

        <!-- Loading State -->
        <div id="loading-state" class="hidden flex flex-col items-center">
            <div class="loader ease-linear rounded-full border-4 border-t-4 border-gray-200 h-12 w-12 mb-4"></div>
            <p class="text-slate-600 animate-pulse">Analyzing content...</p>
        </div>

        <!-- Flashcard Interface (Hidden by default) -->
        <div id="flashcard-interface" class="hidden flex flex-col items-center">
            <!-- Progress Bar -->
            <div class="w-full bg-slate-200 rounded-full h-1.5 mb-6">
                <div id="progress-bar" class="bg-indigo-500 h-1.5 rounded-full transition-all duration-300" style="width: 0%"></div>
            </div>

            <!-- The Card -->
            <div class="perspective w-full h-80 mb-8">
                <div id="card-inner" class="card-inner">
                    <div class="card-format card-front text-xl font-medium text-slate-800">
                        <p id="card-question">Loading question...</p>
                    </div>
                    <div class="card-back text-lg text-slate-600 italic">
                        <p id="card-answer">Loading answer...</p>
                    </div>
                </div>
            </div>

            <!-- Controls -->
            <div class="flex items-center gap-8">
                <button id="prev-btn" class="p-4 rounded-full bg-white text-slate-600 shadow-sm hover:bg-slatearies transition-colors disabled:opacity-30">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
                    </svg>
                </button>
                
                <span id="card-counter" class="text-slate-500 font-medium">0 / 0</span>

                <button id="next-btn" class="p-4 rounded-full bg-white text-slate-600 shadow-sm hover:bg-indigo-50 transition-colors disabled:opacity-30">
                    <svg xmlns="to="w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" />
                    </svg>
                </button>
            </div>

            <!-- Reset Button -->
            <button id="reset-btn" class="mt-12 text-sm text-slate-400 hover:text-red-500 transition-colors underline underline-offset-4">
                Upload a different file
            </button>
        </div>

    </main>

    <script>
        // Initialize PDF.js worker
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

        const fileUpload = document.getElementById('file-upload');
        const uploadSection = document.getElementById('upload-section');
        const loadingState = document.getElementById('loading-state');
        const flashcardInterface = document.getElementById('flashcard-interface');
        const cardInner = document.getElementById('card-inner');
        const cardQuestion = document.getElementById('card-question');
        const cardAnswer = document.getElementById('card-answer');
        const progressBar = document.getElementById('progress-bar');
        const cardCounter = document.getElementById('card-counter');
        const prevBtn = document.getElementById('prev-btn');
        const nextBtn = document.getElementById('next-btn');
        const resetBtn = document.getElementById('reset-btn');

        let cards = [];
        let currentIndex = 0;

        // Event Listeners
        fileUpload.addEventListener('change', handleFileUpload);
        cardInner.addEventListener('click', () => cardInner.classList.toggle('card-flipped'));
        nextBtn.addEventListener('click', () => navigate(1));
        prevBtn.addEventListener('click', () => navigate(-1));
        resetBtn.addEventListener('click', resetApp);

        async function handleFileUpload(event) {
            const file = event.target.files[0];
            if (!file || file.type !== 'application/pdf') return;

            // UI Transition to Loading
            uploadSection.classList.add('hidden');
            loadingState.classList.remove('hidden');

            try {
                const text = await extractTextFromPDF(file);
                cards = generateCardsFromText(text);
                
                if (cards.length === 0) throw new Error("Could not find enough content to create cards.");
                
                startFlashcardSession();
            } catch (error) {
                alert("Error processing PDF: " + error.message);
                resetApp();
            }
        }

        async function extractTextFromPDF(file) {
            const arrayBuffer = await file.arrayBuffer();
            const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
            let fullText = "";

            for (let i = 1; i <= pdf.numPages; i++) {
                const page = await pdf.getPage(i);
                const content = await page.getTextContent();
                const strings = content.items.map(item => item.str);
                fullText += strings.join(' ') + " ";
            }
            return fullText;
        }

        /**
         * LOGIC LAYER: Simple Heuristic Card Generation
         * In a real production app, you would send 'text' to an OpenAI API here.
         * For this demo, we split text into sentences and use them as facts.
         */
        function generateCardsFromText(text) {
            // Split by sentence endings (., !, ?)
            const sentences = text.split(/[.!?]+/).map(s => s.trim()).filter(s => s.length > 40);
            
            // Create cards: Question is the first half, Answer is the second half of a long sentence.
            // This is a fallback for when no LLM is available.
            return sentences.slice(0, 20).map(sentence => {
                const midpoint = Math.floor(sentence.length / 2);
                return {
                    question: "What is described as: " + sentence.substring(0, midpoint) + "...",
                    answer: sentence.substring(midpoint)
                };
            });
        }

        function startFlashcardSession() {
            loadingState.classList.add('hidden');
            flashcardInterface.classList.remove('hidden');
            currentIndex = 0;
            updateCard();
        }

        function updateCard() {
            const card = cards[currentIndex];
            
            // Reset flip animation before changing content
            cardInner.classList.remove('card-flipped');
            
            // Delay text change to match animation
            setTimeout(() => {
                cardQuestion.textContent = card.question;
                cardAnswer.textContent = card.answer;
                
                // Update UI elements
                cardCounter.textContent = `${currentIndex + 1} / ${cards.length}`;
                const progress = ((currentIndex + 1) / cards.length) * 100;
                progressBar.style.width = `${progress}%`;
                
                prevBtn.disabled = currentIndex === 0;
                nextBtn.disabled = currentIndex === cards.length - 1;
            }, 150);
        }

        function navigate(direction) {
            currentIndex += direction
                        updateCard();
        }

        function resetApp() {
            // Reset state
            cards = [];
            currentIndex = 0;
            
            // Reset UI
            fileUpload.value = "";
            flashcardInterface.classList.add('hidden');
            loadingState.classList.add('hidden');
            uploadSection.classList.remove('hidden');
        }
    </script>
</body>
</html>
